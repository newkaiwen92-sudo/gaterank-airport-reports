name: Update README report index

on:
  push:
    paths:
      - "incoming/**/*.md"
      - "reports/**/*.md"
      - "data/reports-index.json"
      - "scripts/*.py"
      - ".github/workflows/update-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Import incoming reports
        run: python3 scripts/import_report.py --incoming incoming

      - name: Update README
        run: python3 scripts/update_readme.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update GateRank report index"
          file_pattern: "README.md data/reports-index.json reports/**/*.md"
